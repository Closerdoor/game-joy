<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三维弹球 - Game-Joy</title>
  <link rel="stylesheet" href="../../css/common.css">
  <link rel="stylesheet" href="../../css/game.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-layout">
    <header class="game-header">
      <div class="game-header-left">
        <a href="../../index.html" class="back-btn">← 返回</a>
      </div>
      <div class="game-header-center">🎱 三维弹球</div>
      <div class="game-header-right">
        <div class="high-score">最高分: <span class="high-score-value" id="high-score">0</span></div>
      </div>
    </header>

    <div class="game-area">
      <div class="game-container">
        <div class="game-controls">
          <div class="score-display">
            <div class="score-box">
              <div class="score-label">分数</div>
              <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
              <div class="score-label">生命</div>
              <div class="score-value" id="lives">3</div>
            </div>
          </div>
          <button class="btn" id="start-btn">开始游戏</button>
        </div>
        <canvas id="canvas" width="800" height="600"></canvas>
      </div>
    </div>

    <div class="game-info">
      <div class="info-section">
        <h3 class="info-section-title">游戏说明</h3>
        <div class="info-section-content">
          使用 ← → 方向键控制挡板，保持球不落地，击碎所有砖块获胜！
        </div>
      </div>
      <div class="info-section">
        <h3 class="info-section-title">排行榜</h3>
        <div id="leaderboard"></div>
      </div>
    </div>
  </div>

  <script src="../../js/common.js"></script>
  <script src="game.js"></script>
  <script src="ui.js"></script>
</body>
</html>
