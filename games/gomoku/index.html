<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>五子棋 - Game-Joy</title>
  <link rel="stylesheet" href="../../css/common.css">
  <link rel="stylesheet" href="../../css/game.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-layout">
    <header class="game-header">
      <div class="game-header-left">
        <a href="../../index.html" class="back-btn">← 返回</a>
      </div>
      <div class="game-header-center">⚫ 五子棋</div>
      <div class="game-header-right">
        <div class="high-score">胜局: <span class="high-score-value" id="wins">0</span></div>
      </div>
    </header>

    <div class="game-area">
      <div class="game-container">
        <div class="game-controls">
          <div class="status" id="status">你的回合 (黑棋)</div>
          <button class="btn" id="new-game">新游戏</button>
        </div>
        <canvas id="canvas" width="600" height="600"></canvas>
      </div>
    </div>

    <div class="game-info">
      <div class="info-section">
        <h3 class="info-section-title">游戏说明</h3>
        <div class="info-section-content">
          点击棋盘落子，先连成五子者获胜。你执黑棋，AI 执白棋。
        </div>
      </div>
      <div class="info-section">
        <h3 class="info-section-title">战绩统计</h3>
        <div id="stats"></div>
      </div>
    </div>
  </div>

  <script src="../../js/common.js"></script>
  <script src="game.js"></script>
  <script src="ui.js"></script>
</body>
</html>
